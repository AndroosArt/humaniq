<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human IQ | Growth & Conversion Review</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
          colors: {
            emerald: {
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
            }
          }
        }
      }
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .fade-up { opacity: 0; transform: translateY(12px); animation: fadeUp 0.35s ease forwards; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-[#0a0a0a] text-zinc-900 dark:text-zinc-50 antialiased selection:bg-emerald-500/30 min-h-screen">
  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-3xl">
      <div class="mb-6 flex items-center justify-between gap-4">
        <a href="./index.html" class="inline-flex items-center gap-2 text-sm text-zinc-600 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white transition-colors">
          <span aria-hidden="true">&larr;</span>
          Back to Human IQ
        </a>
        <button id="themeToggle" class="rounded-full border border-zinc-200 dark:border-white/10 px-3 py-1.5 text-sm text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-white/10 transition-colors">
          Toggle theme
        </button>
      </div>

      <section class="overflow-hidden rounded-3xl border border-zinc-200 dark:border-white/10 bg-white dark:bg-[#111] shadow-xl dark:shadow-none">
        <div class="h-1.5 w-full bg-zinc-100 dark:bg-white/5">
          <div id="progressBar" class="h-full bg-emerald-500 transition-all duration-300" style="width:0%"></div>
        </div>

        <div class="px-6 py-6 sm:px-10 sm:py-8 border-b border-zinc-100 dark:border-white/10 flex items-center justify-between gap-4">
          <div>
            <p class="text-xs uppercase tracking-[0.18em] text-emerald-600 dark:text-emerald-400 font-medium">Human IQ</p>
            <h1 class="mt-2 text-2xl sm:text-3xl font-semibold tracking-tight">Growth &amp; Conversion Review</h1>
          </div>
          <div class="text-right">
            <p id="stepCounter" class="text-sm text-zinc-500 dark:text-zinc-400">Step 1 of 1</p>
            <p class="mt-1 text-xs text-zinc-500 dark:text-zinc-400">3–5 minutes</p>
          </div>
        </div>

        <div class="px-6 py-8 sm:px-10 sm:py-10 min-h-[460px] flex flex-col justify-between">
          <div id="screen" class="fade-up"></div>

          <div id="nav" class="mt-8 flex items-center justify-between gap-3">
            <button id="backBtn" type="button" class="inline-flex items-center justify-center rounded-full border border-zinc-200 dark:border-white/10 px-5 py-3 text-sm font-medium text-zinc-700 dark:text-zinc-200 hover:bg-zinc-100 dark:hover:bg-white/10 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
              Back
            </button>
            <button id="nextBtn" type="button" class="inline-flex items-center justify-center rounded-full bg-zinc-900 dark:bg-white px-6 py-3 text-sm font-medium text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-zinc-100 transition-colors">
              Continue
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'humaniq-growth-review';
    const FORM_ENDPOINT = ''; // Optional: add your endpoint later. Example: '/api/review' or external form endpoint.

    const screens = [
      {
        type: 'welcome',
        title: 'Start Your Growth & Conversion Review',
        description: 'Complete this short intake so we can review how your business generates leads, qualifies opportunities, follows up, and converts demand into revenue.',
        helper: 'This review is built for founder-led businesses that want a clearer path from inquiry to revenue.',
        nextLabel: 'Start Review'
      },
      { name: 'business_name', label: 'What is the name of your business?', type: 'text', required: true, section: 'Business Snapshot' },
      { name: 'website', label: 'What is your website?', type: 'url', required: false, section: 'Business Snapshot' },
      { name: 'contact_name', label: 'What is your name?', type: 'text', required: true, section: 'Business Snapshot' },
      { name: 'email', label: 'What is your email address?', type: 'email', required: true, section: 'Business Snapshot' },
      { name: 'phone', label: 'What is the best phone number to reach you?', type: 'tel', required: false, section: 'Business Snapshot' },
      { name: 'industry', label: 'What industry is your business in?', type: 'text', required: true, section: 'Business Snapshot' },
      { name: 'offer', label: 'What do you sell?', type: 'textarea', required: true, section: 'Business Snapshot' },
      { name: 'ideal_customer', label: 'Who is your ideal customer?', type: 'textarea', required: true, section: 'Business Snapshot' },
      { name: 'team_size', label: 'How large is your team?', type: 'single', required: true, section: 'Business Snapshot', options: ['Just me','2–5','6–15','16–50','50+'] },
      { name: 'monthly_revenue_range', label: 'What is your approximate monthly revenue range?', type: 'single', required: true, section: 'Business Snapshot', options: ['Under $25k','$25k–$50k','$50k–$100k','$100k–$250k','$250k+'] },

      { type: 'section', title: 'Lead Flow', description: 'A few questions about where your opportunities come from today.' },
      { name: 'lead_sources', label: 'Where do most of your leads currently come from?', type: 'multi', required: true, section: 'Lead Flow', options: ['Referrals','Website / SEO','Paid ads','Social media','Email marketing','Outbound sales','Partnerships','Repeat customers','Other'] },
      { name: 'monthly_lead_volume', label: 'About how many new leads do you generate in a typical month?', type: 'single', required: true, section: 'Lead Flow', options: ['0–10','11–25','26–50','51–100','100+'] },
      { name: 'best_channel', label: 'Which channel brings your best leads?', type: 'single', required: true, section: 'Lead Flow', options: ['Referrals','Website / SEO','Paid ads','Social media','Email marketing','Outbound sales','Partnerships','Repeat customers','Other'] },
      { name: 'enough_leads', label: 'Are you getting enough leads right now?', type: 'single', required: true, section: 'Lead Flow', options: ['Yes','Somewhat','No'] },
      { name: 'lead_generation_challenge', label: 'What is your biggest lead generation challenge right now?', type: 'textarea', required: true, section: 'Lead Flow' },

      { type: 'section', title: 'Qualification', description: 'Help us understand how you identify your best opportunities.' },
      { name: 'qualification_process', label: 'How do you currently qualify leads before a sales conversation?', type: 'textarea', required: true, section: 'Qualification' },
      { name: 'unqualified_reaching_calls', label: 'Do unqualified leads regularly make it into calls or appointments?', type: 'single', required: true, section: 'Qualification', options: ['Often','Sometimes','Rarely','Never'] },
      { name: 'common_disqualifier', label: 'What usually makes a lead unqualified?', type: 'single', required: true, section: 'Qualification', options: ['Wrong budget','Wrong timing','Not the right decision-maker','Poor fit for our service','Just exploring / not serious','Other'] },
      { name: 'defined_qualification_process', label: 'Do you have a defined process for identifying your best opportunities?', type: 'single', required: true, section: 'Qualification', options: ['Yes','Somewhat','No'] },

      { type: 'section', title: 'Follow-Up & Sales Handling', description: 'This helps us understand where opportunities may be slowing down or getting lost.' },
      { name: 'response_speed', label: 'How quickly are new leads typically contacted?', type: 'single', required: true, section: 'Follow-Up & Sales Handling', options: ['Within 5 minutes','Within 1 hour','Same day','1–2 days','3+ days','It varies a lot'] },
      { name: 'follow_up_owner', label: 'Who handles follow-up today?', type: 'single', required: true, section: 'Follow-Up & Sales Handling', options: ['Owner','Sales rep','Admin / coordinator','Multiple people','No consistent owner'] },
      { name: 'follow_up_consistency', label: 'Is follow-up consistent across all new leads?', type: 'single', required: true, section: 'Follow-Up & Sales Handling', options: ['Yes','Mostly','No'] },
      { name: 'follow_up_attempts', label: 'How many follow-up attempts are usually made before a lead is considered lost?', type: 'single', required: true, section: 'Follow-Up & Sales Handling', options: ['1','2–3','4–5','6+','Not sure'] },
      { name: 'follow_up_challenge', label: 'What is your biggest follow-up challenge right now?', type: 'textarea', required: true, section: 'Follow-Up & Sales Handling' },

      { type: 'section', title: 'Systems & Operations', description: 'We want to understand how organized your current process is.' },
      { name: 'crm', label: 'What CRM or lead tracking system do you use?', type: 'text', required: false, section: 'Systems & Operations' },
      { name: 'scheduling_tool', label: 'What scheduling tool do you use, if any?', type: 'text', required: false, section: 'Systems & Operations' },
      { name: 'automation_tools', label: 'What automation tools do you currently use, if any?', type: 'text', required: false, section: 'Systems & Operations' },
      { name: 'pipeline_organization', label: 'How organized is your lead pipeline today?', type: 'single', required: true, section: 'Systems & Operations', options: ['Very organized','Somewhat organized','Disorganized','We do not really have a system'] },
      { name: 'leakage_point', label: 'Where do leads most often get stuck or lost?', type: 'textarea', required: true, section: 'Systems & Operations' },

      { type: 'section', title: 'Goals & Fit', description: 'Final questions so we can understand priorities and urgency.' },
      { name: 'ninety_day_priority', label: 'What is your top growth priority over the next 90 days?', type: 'single', required: true, section: 'Goals & Fit', options: ['More leads','Better-quality leads','Faster follow-up','More booked appointments','Better close rate','Better systems and visibility'] },
      { name: 'biggest_blocker', label: 'What do you believe is the biggest thing stopping more leads from turning into revenue right now?', type: 'textarea', required: true, section: 'Goals & Fit' },
      { name: 'urgency', label: 'How urgent is this problem?', type: 'single', required: true, section: 'Goals & Fit', options: ['Immediate priority','Important this quarter','Exploring options'] },
      { name: 'looking_for_support', label: 'Are you actively looking for support to improve this process?', type: 'single', required: true, section: 'Goals & Fit', options: ['Yes, immediately','Yes, soon','Maybe','Just exploring'] },
      { name: 'investment_range', label: 'What level of investment are you open to if the solution is a strong fit?', type: 'single', required: true, section: 'Goals & Fit', options: ['Under $2,500','$2,500–$5,000','$5,000–$10,000','$10,000+','Not sure yet'] },
      { name: 'best_time_for_call', label: 'What is the best time for a strategy call?', type: 'text', required: false, section: 'Goals & Fit' },
      { type: 'thankyou', title: 'Thanks — Your Review Is In', description: 'Your responses have been captured. We’ll review them and use them to shape a tailored growth and conversion recommendation.', helper: 'For launch, you can keep this as a thank-you screen or later route stronger leads to an optional booking step.' }
    ];

    const state = {
      index: 0,
      values: loadValues(),
      isDarkMode: document.documentElement.classList.contains('dark'),
      isSubmitting: false,
    };

    const screenEl = document.getElementById('screen');
    const nextBtn = document.getElementById('nextBtn');
    const backBtn = document.getElementById('backBtn');
    const stepCounter = document.getElementById('stepCounter');
    const progressBar = document.getElementById('progressBar');
    const themeToggle = document.getElementById('themeToggle');

    function loadValues() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function persistValues() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.values));
    }

    function countProgressScreens() {
      return screens.filter(s => !['welcome', 'thankyou', 'section'].includes(s.type)).length;
    }

    function currentProgressIndex() {
      const screen = screens[state.index];
      if (['welcome', 'thankyou', 'section'].includes(screen.type)) return 0;
      let count = 0;
      for (let i = 0; i <= state.index; i += 1) {
        if (!['welcome', 'thankyou', 'section'].includes(screens[i].type)) count += 1;
      }
      return count;
    }

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      const screen = screens[state.index];
      screenEl.className = 'fade-up';
      nextBtn.disabled = false;
      backBtn.disabled = state.index === 0 || screen.type === 'thankyou';

      const progressCount = countProgressScreens();
      const progressIndex = currentProgressIndex();
      const percent = progressCount ? Math.round((progressIndex / progressCount) * 100) : 0;
      progressBar.style.width = `${percent}%`;
      stepCounter.textContent = screen.type === 'thankyou'
        ? 'Complete'
        : screen.type === 'welcome'
          ? 'Introduction'
          : `Step ${progressIndex} of ${progressCount}`;

      if (screen.type === 'welcome') {
        nextBtn.textContent = screen.nextLabel || 'Continue';
        screenEl.innerHTML = `
          <div class="max-w-2xl">
            <p class="text-sm text-emerald-600 dark:text-emerald-400 font-medium">Practical AI. Real Human Strategy.</p>
            <h2 class="mt-4 text-3xl sm:text-4xl font-semibold tracking-tight">${escapeHtml(screen.title)}</h2>
            <p class="mt-5 text-lg leading-relaxed text-zinc-600 dark:text-zinc-400">${escapeHtml(screen.description)}</p>
            <div class="mt-8 rounded-2xl border border-zinc-200 dark:border-white/10 bg-zinc-50 dark:bg-black/30 p-5">
              <p class="text-sm text-zinc-700 dark:text-zinc-300">${escapeHtml(screen.helper)}</p>
            </div>
          </div>
        `;
        return;
      }

      if (screen.type === 'section') {
        nextBtn.textContent = 'Continue';
        screenEl.innerHTML = `
          <div class="max-w-2xl">
            <p class="text-sm uppercase tracking-[0.18em] text-emerald-600 dark:text-emerald-400 font-medium">${escapeHtml(screen.title)}</p>
            <h2 class="mt-4 text-3xl font-semibold tracking-tight">${escapeHtml(screen.title)}</h2>
            <p class="mt-5 text-lg leading-relaxed text-zinc-600 dark:text-zinc-400">${escapeHtml(screen.description)}</p>
          </div>
        `;
        return;
      }

      if (screen.type === 'thankyou') {
        nextBtn.textContent = 'Back to Site';
        screenEl.innerHTML = `
          <div class="max-w-2xl">
            <p class="text-sm uppercase tracking-[0.18em] text-emerald-600 dark:text-emerald-400 font-medium">Submission received</p>
            <h2 class="mt-4 text-3xl font-semibold tracking-tight">${escapeHtml(screen.title)}</h2>
            <p class="mt-5 text-lg leading-relaxed text-zinc-600 dark:text-zinc-400">${escapeHtml(screen.description)}</p>
            <div class="mt-8 rounded-2xl border border-zinc-200 dark:border-white/10 bg-zinc-50 dark:bg-black/30 p-5">
              <p class="text-sm text-zinc-700 dark:text-zinc-300">${escapeHtml(screen.helper)}</p>
            </div>
          </div>
        `;
        return;
      }

      nextBtn.textContent = state.index === screens.length - 2 ? 'Submit Review' : 'Continue';
      screenEl.innerHTML = renderQuestion(screen);
      attachInputHandlers(screen);
    }

    function renderQuestion(screen) {
      const value = state.values[screen.name];
      const valueStr = Array.isArray(value) ? value : (value || '');
      const section = screen.section ? `<p class="text-sm text-emerald-600 dark:text-emerald-400 font-medium">${escapeHtml(screen.section)}</p>` : '';

      if (screen.type === 'text' || screen.type === 'email' || screen.type === 'tel' || screen.type === 'url') {
        return `
          <div class="max-w-2xl">
            ${section}
            <h2 class="mt-3 text-2xl sm:text-3xl font-semibold tracking-tight">${escapeHtml(screen.label)}</h2>
            <input id="questionInput" type="${screen.type}" value="${escapeHtml(valueStr)}" class="mt-8 w-full rounded-2xl border border-zinc-200 dark:border-white/10 bg-white dark:bg-black/30 px-5 py-4 text-lg outline-none transition focus:border-emerald-500" placeholder="Type your answer" />
          </div>
        `;
      }

      if (screen.type === 'textarea') {
        return `
          <div class="max-w-2xl">
            ${section}
            <h2 class="mt-3 text-2xl sm:text-3xl font-semibold tracking-tight">${escapeHtml(screen.label)}</h2>
            <textarea id="questionInput" rows="6" class="mt-8 w-full rounded-2xl border border-zinc-200 dark:border-white/10 bg-white dark:bg-black/30 px-5 py-4 text-lg outline-none transition focus:border-emerald-500" placeholder="Type your answer">${escapeHtml(valueStr)}</textarea>
          </div>
        `;
      }

      if (screen.type === 'single') {
        return `
          <div class="max-w-2xl">
            ${section}
            <h2 class="mt-3 text-2xl sm:text-3xl font-semibold tracking-tight">${escapeHtml(screen.label)}</h2>
            <div class="mt-8 grid gap-3">
              ${screen.options.map(option => {
                const checked = value === option;
                return `
                  <label class="rounded-2xl border ${checked ? 'border-emerald-500 bg-emerald-500/10' : 'border-zinc-200 dark:border-white/10 bg-white dark:bg-black/30'} px-5 py-4 cursor-pointer transition hover:border-emerald-500/60">
                    <input class="sr-only" type="radio" name="${screen.name}" value="${escapeHtml(option)}" ${checked ? 'checked' : ''} />
                    <span class="text-base sm:text-lg">${escapeHtml(option)}</span>
                  </label>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      if (screen.type === 'multi') {
        const selected = Array.isArray(value) ? value : [];
        return `
          <div class="max-w-2xl">
            ${section}
            <h2 class="mt-3 text-2xl sm:text-3xl font-semibold tracking-tight">${escapeHtml(screen.label)}</h2>
            <p class="mt-3 text-sm text-zinc-500 dark:text-zinc-400">Select all that apply.</p>
            <div class="mt-8 grid gap-3">
              ${screen.options.map(option => {
                const checked = selected.includes(option);
                return `
                  <label class="rounded-2xl border ${checked ? 'border-emerald-500 bg-emerald-500/10' : 'border-zinc-200 dark:border-white/10 bg-white dark:bg-black/30'} px-5 py-4 cursor-pointer transition hover:border-emerald-500/60">
                    <input class="mr-3 align-middle" type="checkbox" name="${screen.name}" value="${escapeHtml(option)}" ${checked ? 'checked' : ''} />
                    <span class="text-base sm:text-lg">${escapeHtml(option)}</span>
                  </label>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      return '<div></div>';
    }

    function attachInputHandlers(screen) {
      if (['text', 'email', 'tel', 'url', 'textarea'].includes(screen.type)) {
        const input = document.getElementById('questionInput');
        if (!input) return;
        input.focus();
        input.addEventListener('input', () => {
          state.values[screen.name] = input.value;
          persistValues();
        });
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' && screen.type !== 'textarea') {
            event.preventDefault();
            handleNext();
          }
        });
      }

      if (screen.type === 'single') {
        document.querySelectorAll(`input[name="${screen.name}"]`).forEach(input => {
          input.addEventListener('change', () => {
            state.values[screen.name] = input.value;
            persistValues();
            render();
          });
        });
      }

      if (screen.type === 'multi') {
        document.querySelectorAll(`input[name="${screen.name}"]`).forEach(input => {
          input.addEventListener('change', () => {
            const selected = Array.from(document.querySelectorAll(`input[name="${screen.name}"]:checked`)).map(el => el.value);
            state.values[screen.name] = selected;
            persistValues();
            render();
          });
        });
      }
    }

    function validateCurrentScreen() {
      const screen = screens[state.index];
      if (!screen.required) return true;
      const value = state.values[screen.name];

      if (screen.type === 'multi') {
        return Array.isArray(value) && value.length > 0;
      }

      if (typeof value === 'string') {
        return value.trim().length > 0;
      }

      return value !== undefined && value !== null && value !== '';
    }

    function showValidationError() {
      const existing = document.getElementById('validationError');
      if (existing) return;
      const el = document.createElement('p');
      el.id = 'validationError';
      el.className = 'mt-4 text-sm font-medium text-rose-600';
      el.textContent = 'Please complete this step before continuing.';
      screenEl.appendChild(el);
    }

    function clearValidationError() {
      document.getElementById('validationError')?.remove();
    }

    async function handleSubmit() {
      if (state.isSubmitting) return;
      state.isSubmitting = true;
      nextBtn.disabled = true;
      nextBtn.textContent = 'Submitting...';

      const payload = {
        submittedAt: new Date().toISOString(),
        source: 'human-iq-custom-review',
        values: state.values,
      };

      try {
        if (FORM_ENDPOINT) {
          const response = await fetch(FORM_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!response.ok) throw new Error('Submission failed');
        } else {
          console.info('No FORM_ENDPOINT configured. Review payload saved locally only.', payload);
          localStorage.setItem(`${STORAGE_KEY}-last-submission`, JSON.stringify(payload));
        }
        state.index += 1;
        render();
      } catch (error) {
        alert('Your review could not be submitted yet. Please try again or contact Human IQ directly.');
        console.error(error);
      } finally {
        state.isSubmitting = false;
      }
    }

    function handleNext() {
      clearValidationError();
      const screen = screens[state.index];

      if (screen.type === 'thankyou') {
        window.location.href = './index.html';
        return;
      }

      if (!['welcome', 'section'].includes(screen.type) && !validateCurrentScreen()) {
        showValidationError();
        return;
      }

      if (state.index === screens.length - 2) {
        handleSubmit();
        return;
      }

      state.index += 1;
      render();
    }

    function handleBack() {
      clearValidationError();
      if (state.index > 0) {
        state.index -= 1;
        render();
      }
    }

    nextBtn.addEventListener('click', handleNext);
    backBtn.addEventListener('click', handleBack);

    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      state.isDarkMode = document.documentElement.classList.contains('dark');
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') handleBack();
    });

    render();
  </script>
</body>
</html>
